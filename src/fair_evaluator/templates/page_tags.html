<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Tag - Valutatore Fiere</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .sidebar { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); min-height: 100vh; }
    .nav-link { color: #94a3b8; padding: 12px 20px; border-radius: 8px; margin: 2px 8px; }
    .nav-link:hover, .nav-link.active { background: #334155; color: #fff; }
    .tag-card { display: flex; align-items: center; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; }
    .tag-color { width: 16px; height: 16px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
    .category-tabs .nav-link.active { background: #3b82f6; color: white; }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-2 sidebar p-0">
        <div class="p-3 text-white border-bottom border-secondary">
          <h5 class="mb-0"><i class="fas fa-tags me-2"></i>Tag</h5>
        </div>
        <nav class="nav flex-column mt-2">
          <a class="nav-link" href="/"><i class="fas fa-home me-2"></i>Home</a>
          <a class="nav-link" href="/fairs"><i class="fas fa-building me-2"></i>Fiere</a>
          <a class="nav-link" href="/fairs/new"><i class="fas fa-plus me-2"></i>Nuova Fiera</a>
          <a class="nav-link" href="/calendar"><i class="fas fa-calendar me-2"></i>Calendario</a>
          <a class="nav-link active" href="/tags"><i class="fas fa-tags me-2"></i>Tag</a>
          <a class="nav-link" href="/settings"><i class="fas fa-cog me-2"></i>Impostazioni</a>
        </nav>
      </div>
      <div class="col-md-10 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h3><i class="fas fa-tags me-2"></i>Gestione Tag</h3>
          <button class="btn btn-primary" onclick="showAddModal()"><i class="fas fa-plus me-2"></i>Nuovo Tag</button>
        </div>
        
        <ul class="nav nav-pills category-tabs mb-4" id="categoryTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="sector-tab" data-bs-toggle="pill" data-bs-target="#sector" type="button" onclick="loadTags('sector')">
              <i class="fas fa-industry me-2"></i>Settori
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="profile-tab" data-bs-toggle="pill" data-bs-target="#profile" type="button" onclick="loadTags('visitor_profile')">
              <i class="fas fa-users me-2"></i>Profili Visitatori
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="category-tab" data-bs-toggle="pill" data-bs-target="#category" type="button" onclick="loadTags('product_category')">
              <i class="fas fa-box me-2"></i>Categorie Prodotto
            </button>
          </li>
        </ul>
        
        <div class="row">
          <div class="col-md-6">
            <div class="card">
              <div class="card-header">
                <h5 class="mb-0" id="categoryTitle">Settori</h5>
              </div>
              <div class="card-body" id="tagsList">
                <p class="text-muted">Caricamento...</p>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card">
              <div class="card-header">
                <h5 class="mb-0">Anteprima Tag</h5>
              </div>
              <div class="card-body">
                <div id="tagPreview"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="modal fade" id="tagModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="tagModalTitle">Nuovo Tag</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="tagCategory" value="sector">
          <div class="mb-3">
            <label class="form-label">Nome Tag</label>
            <input type="text" class="form-control" id="tagName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Colore</label>
            <input type="color" class="form-control" id="tagColor" value="#3b82f6">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
          <button type="button" class="btn btn-primary" onclick="saveTag()">Salva</button>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    let currentCategory = 'sector';
    let tags = [];
    
    const categoryNames = {
      'sector': 'Settori',
      'visitor_profile': 'Profili Visitatori',
      'product_category': 'Categorie Prodotto'
    };
    
    async function loadTags(category) {
      currentCategory = category;
      document.getElementById('categoryTitle').textContent = categoryNames[category];
      document.getElementById('tagCategory').value = category;
      
      const resp = await fetch('/api/tags?category=' + category);
      tags = await resp.json();
      
      const list = document.getElementById('tagsList');
      if (!tags.length) {
        list.innerHTML = '<p class="text-muted">Nessun tag. Crea il primo!</p>';
      } else {
        list.innerHTML = tags.map(t => `
          <div class="tag-card">
            <div class="tag-color" style="background:${t.color}"></div>
            <span class="flex-grow-1">${t.name}</span>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteTag(${t.id})">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        `).join('');
      }
      
      renderPreview();
    }
    
    function renderPreview() {
      const preview = document.getElementById('tagPreview');
      preview.innerHTML = tags.map(t => `
        <span class="badge me-1 mb-1" style="background:${t.color}; color: white; padding: 4px 8px;">
          ${t.name}
        </span>
      `).join('') || '<p class="text-muted small">Anteprima vuota</p>';
    }
    
    function showAddModal() {
      document.getElementById('tagModalTitle').textContent = 'Nuovo Tag';
      document.getElementById('tagName').value = '';
      document.getElementById('tagColor').value = '#3b82f6';
      document.getElementById('tagCategory').value = currentCategory;
      new bootstrap.Modal(document.getElementById('tagModal')).show();
    }
    
    async function saveTag() {
      const name = document.getElementById('tagName').value.trim();
      const color = document.getElementById('tagColor').value;
      const category = document.getElementById('tagCategory').value;
      
      if (!name) { alert('Nome richiesto'); return; }
      
      try {
        const resp = await fetch('/api/tags', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name, color, category})
        });
        
        if (resp.ok) {
          bootstrap.Modal.getInstance(document.getElementById('tagModal')).hide();
          loadTags(currentCategory);
        } else {
          alert('Errore nel salvataggio');
        }
      } catch (e) {
        alert('Errore: ' + e.message);
      }
    }
    
    async function deleteTag(id) {
      if (!confirm('Eliminare questo tag?')) return;
      
      await fetch('/api/tags/' + id, {method: 'DELETE'});
      loadTags(currentCategory);
    }
    
    loadTags('sector');
  </script>
</body>
</html>
